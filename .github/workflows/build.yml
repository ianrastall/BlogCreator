name: Build BlogCreator

on:
  push:
    branches: [main, bootstrap]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BlogCreator.slnx

      - name: Build core libraries
        run: |
          dotnet build src/BlogCreator.Core/BlogCreator.Core.csproj -c Release --no-restore
          dotnet build src/BlogCreator.Application/BlogCreator.Application.csproj -c Release --no-restore
          dotnet build src/BlogCreator.Infrastructure/BlogCreator.Infrastructure.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/BlogCreator.Tests/BlogCreator.Tests.csproj -c Release --no-restore

      - name: Build WinUI app
        id: winui-build
        shell: pwsh
        run: |
          dotnet build src/BlogCreator.WinUI/BlogCreator.WinUI.csproj -c Release --no-restore -p:Platform=x64 *> winui-build.log
          $buildExitCode = $LASTEXITCODE
          Get-Content winui-build.log | Select-String -Pattern "error" | Select-Object -First 30
          exit $buildExitCode

      - name: Upload WinUI build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: winui-build-log
          path: winui-build.log
          if-no-files-found: error
